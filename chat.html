<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Chat</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#f5f6f7;
margin:0;
font-family:Arial,sans-serif;
}

.chat-container{
max-width:430px;
margin:auto;
height:100vh;
display:flex;
flex-direction:column;
background:white;
}

.header{
background:#1877f2;
color:white;
padding:16px;
font-size:20px;
font-weight:bold;
text-align:center;
}

#chatBox{
flex:1;
overflow-y:auto;
padding:15px;
background:#f0f2f5;
}

.userMsg{
background:#1877f2;
color:white;
padding:12px;
border-radius:15px 15px 3px 15px;
margin-bottom:12px;
margin-left:40px;
word-wrap:break-word;
}

.adminMsg{
background:white;
padding:12px;
border-radius:15px 15px 15px 3px;
margin-bottom:12px;
margin-right:40px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
word-wrap:break-word;
}

.bottom{
display:flex;
padding:10px;
background:white;
border-top:1px solid #ddd;
}

.bottom input{
flex:1;
padding:14px;
border:1px solid #ccc;
border-radius:25px;
font-size:16px;
outline:none;
}

.bottom button{
margin-left:10px;
padding:14px 22px;
border:none;
background:#1877f2;
color:white;
border-radius:25px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">
Live Support
</div>

<div id="chatBox"></div>

<div class="bottom">

<input
type="text"
id="message"
placeholder="Write a message...">

<button id="sendBtn">
Send
</button>

</div>

</div>

<script type="module" src="script.js"></script>

</body>

</html>
