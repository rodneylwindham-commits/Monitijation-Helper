<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Survey</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Creator Survey</h2>

<p class="subtitle">
Please confirm all requirements before continuing.
</p>

<div class="checkBox">
<label>
<input type="checkbox" class="check">
I create original content.
</label>
</div>

<div class="checkBox">
<label>
<input type="checkbox" class="check">
I understand copyright rules.
</label>
</div>

<div class="checkBox">
<label>
<input type="checkbox" class="check">
I have more than 10,000 followers.
</label>
</div>

<div class="checkBox">
<label>
<input type="checkbox" class="check">
My content contains my own voice.
</label>
</div>

<div class="checkBox">
<label>
<input type="checkbox" class="check">
My content has more than 1 million views.
</label>
</div>

<button id="applyBtn" disabled>
Next & Apply
</button>

</div>

<script>

const checks=document.querySelectorAll(".check");
const btn=document.getElementById("applyBtn");

function updateButton(){

let ok=true;

checks.forEach(c=>{
if(!c.checked) ok=false;
});

btn.disabled=!ok;

}

checks.forEach(c=>{
c.addEventListener("change",updateButton);
});

btn.onclick=function(){

window.location.href="status.html";

};

</script>

</body>
</html>
