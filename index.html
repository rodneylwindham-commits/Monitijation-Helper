<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creator Support</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Creator Support</h1>

<p class="subtitle">
Paste your Facebook Page link below
</p>

<input
type="url"
id="pageLink"
placeholder="Paste the link">

<button id="nextBtn">
Next
</button>

</div>

<script>

document.getElementById("nextBtn").addEventListener("click", function () {

const link = document.getElementById("pageLink").value.trim();

if(link===""){

alert("Please paste your link.");

return;

}

localStorage.setItem("pageLink", link);

window.location.href = "review.html";

});

</script>

</body>

</html>
